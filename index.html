<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De reis van je kleding</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --blue: #3498db;
            --grey: #95a5a6;
            --bg: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--primary);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .chain-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 25px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            cursor: pointer;
            border: none;
            background: #dfe6e9;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            transition: 0.3s;
            font-size: 0.85em;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #dfe6e9;
            border-radius: 0 0 8px 8px;
            min-height: 480px; /* Houdt de hoogte constant */
        }

        .tab-content.active { display: block; }

        .slider-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--blue);
        }

        .val-tag {
            float: right;
            color: var(--primary);
            font-weight: bold;
        }

        .status-box {
            margin-top: 10px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .ok { background: #dfe6e9; color: var(--primary); }
        .error { background: #fab1a0; color: #d63031; }

        .chart-container {
            position: sticky;
            top: 10px;
            height: 550px;
            padding: 10px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .chart-container { position: relative; height: 400px; }
            .tab-content { min-height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="image_52efa4.jpg" alt="De reis van je kleding keten" class="chain-image">

    <div class="main-layout">
        <div class="controls">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'tab1')">1. Jullie Inschatting</button>
                <button class="tab-btn" onclick="openTab(event, 'tab2')">2. De Werkelijkheid</button>
                <button class="tab-btn" onclick="openTab(event, 'tab3')">3. Extra €10 Duurzaam</button>
            </div>

            <div id="tab1" class="tab-content active">
                <p><strong>Verdeling van de €50 in de keten-onderdelen (jullie Mentimeter resultaten)</strong></p>
                <div id="sliders-inschatting"></div>
                <div id="status-1" class="status-box ok">Totaal: €0 / €50</div>
            </div>

            <div id="tab2" class="tab-content">
                <p><strong>Gemiddelde verdeling in de huidige fast-fashion industrie (€50)</strong></p>
                <div id="sliders-werkelijkheid"></div>
                <div id="status-2" class="status-box ok">Vastgesteld op €50</div>
            </div>

            <div id="tab3" class="tab-content">
                <p><strong>Verdeel de extra €10 aan welke onderdelen jullie dit zouden besteden</strong></p>
                <div id="sliders-bonus"></div>
                <div id="status-3" class="status-box ok">Extra te verdelen: €10</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    const labels = ['1. Grondstoffen', '2. Productie', '3. Confectie', '4. Merk & Design', '5. Logistiek & Distr.', '6. De Laatste Mijl'];
    
    let dataInschatting = [0, 0, 0, 0, 0, 0];
    const dataWerkelijkheid = [3, 4, 6, 18, 9, 10]; 
    let dataBonus = [0, 0, 0, 0, 0, 0];
    let showReality = false;

    let chart;

    function init() {
        const c1 = document.getElementById('sliders-inschatting');
        const c2 = document.getElementById('sliders-werkelijkheid');
        const c3 = document.getElementById('sliders-bonus');

        labels.forEach((label, i) => {
            c1.innerHTML += createSliderHtml('inschatting', i, label, 0, 50, false);
            c2.innerHTML += createSliderHtml('werkelijkheid', i, label, dataWerkelijkheid[i], 50, true);
            c3.innerHTML += createSliderHtml('bonus', i, label, 0, 10, false);
        });

        renderChart();
    }

    function createSliderHtml(type, index, label, startVal, max, disabled = false) {
        return `
            <div class="slider-group">
                <label>${label} <span class="val-tag">€<span id="val-${type}-${index}">${startVal}</span></span></label>
                <input type="range" id="input-${type}-${index}" min="0" max="${max}" step="0.5" value="${startVal}" 
                ${disabled ? 'disabled' : ''} oninput="updateValues()">
            </div>
        `;
    }

    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
        
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].className = buttons[i].className.replace(" active", "");
        
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";

        showReality = (tabName === 'tab2' || tabName === 'tab3');
        updateValues();
    }

    function updateValues() {
        let total1 = 0, total3 = 0;

        labels.forEach((_, i) => {
            let v1 = parseFloat(document.getElementById(`input-inschatting-${i}`).value);
            dataInschatting[i] = v1;
            document.getElementById(`val-inschatting-${i}`).innerText = v1;
            total1 += v1;

            let v3 = parseFloat(document.getElementById(`input-bonus-${i}`).value);
            dataBonus[i] = v3;
            document.getElementById(`val-bonus-${i}`).innerText = v3;
            total3 += v3;
        });

        document.getElementById('status-1').innerText = `Totaal: €${total1.toFixed(2)} / €50`;
        document.getElementById('status-1').className = (total1 > 50) ? "status-box error" : "status-box ok";

        document.getElementById('status-3').innerText = `Extra verdeeld: €${total3.toFixed(2)} / €10`;
        document.getElementById('status-3').className = (total3 > 10) ? "status-box error" : "status-box ok";

        chart.data.datasets[0].data = dataInschatting;
        chart.data.datasets[2].data = dataBonus;
        chart.data.datasets[1].data = showReality ? dataWerkelijkheid : [0,0,0,0,0,0];
        chart.update();
    }

    function renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Jullie Inschatting (€50)', data: dataInschatting, backgroundColor: '#3498db' },
                    { label: 'De Werkelijkheid (€50)', data: [0,0,0,0,0,0], backgroundColor: '#bdc3c7' },
                    { label: 'Extra Duurzaamheid (€10)', data: dataBonus, backgroundColor: '#27ae60' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 30, title: { display: true, text: 'Euro' } }
                },
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }
    init();
</script>

</body>
</html>
